version: '3.8'

services:
  metardu-postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: metardu-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=metardu
      - POSTGRES_USER=metardu
      - POSTGRES_PASSWORD=metardu_secure_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metardu -d metardu"]
      interval: 5s
      timeout: 5s
      retries: 5

  metardu-worker:
    build:
      context: ./python_worker
    container_name: metardu-worker
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - WORKER_SECRET=dev-worker-secret
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  metardu-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metardu-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://metardu:metardu_secure_2024@metardu-postgres:5432/metardu
      - AUTH_SECRET=dev-auth-secret-32-chars-long-or-more-needed-for-nextauth
      - NEXTAUTH_URL=https://metardu.duckdns.org
      - NEXT_PUBLIC_APP_URL=https://metardu.duckdns.org
      - NEXT_PUBLIC_WS_URL=wss://metardu.duckdns.org/ws/collaboration
      - PYTHON_COMPUTE_URL=http://metardu-worker:8000
      - WORKER_SECRET=dev-worker-secret
      - HOSTNAME=0.0.0.0
      - DISABLE_PWA=true
    depends_on:
      metardu-postgres:
        condition: service_healthy
      metardu-worker:
        condition: service_healthy

  metardu-collaboration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metardu-collaboration
    command: node -e "require('ts-node/register'); const { getCollaborationServer } = require('./src/lib/realtime/collaborationServer'); getCollaborationServer().start(3001);"
    ports:
      - "3001:3001"
    environment:
      - AUTH_SECRET=dev-auth-secret-32-chars-long-or-more-needed-for-nextauth
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  postgres_data:
