services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://metardu:Dosho10701$@db:5432/metardu
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=pYn8VpG3fX7rQ9zW5mK2tB4vE6hJ1nM8 # Replace with secure secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - metardu-network
    restart: always

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=metardu
      - POSTGRES_PASSWORD=Dosho10701$
      - POSTGRES_DB=metardu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metardu"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - metardu-network
    restart: always

networks:
  metardu-network:
    driver: bridge

volumes:
  postgres_data:
