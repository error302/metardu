# Native PostgreSQL deployment (no Supabase dependency)
services:
  metardu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metardu_nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://metardu.duckdns.org}
      # DATABASE_URL is pulled from .env.local — never hardcode credentials here
      - AUTH_TRUST_HOST=true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    driver: bridge
