services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=postgresql://metardu:Metardu2026SecurePwd@host.docker.internal:5432/metardu
        - AUTH_SECRET=metardu-super-secret-key-32-chars-minimum-2026
    container_name: metardu_nextjs
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://$(hostname -i):3000/api/public/health\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - metardu-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

networks:
  metardu-network:
    driver: bridge
