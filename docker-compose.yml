services:
  metardu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metardu_nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - metardu_network

networks:
  metardu_network:
    driver: bridge