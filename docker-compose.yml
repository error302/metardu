# Deferred path: keep for experiments and fallback work, but do not run this
# alongside the canonical PM2 standalone deployment during stabilization.
services:
  metardu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metardu_nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://metardu.duckdns.org}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - metardu_network

networks:
  metardu_network:
    driver: bridge
