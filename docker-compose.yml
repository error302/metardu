version: '3.8'

# AUDIT FIX (H8, 2026-07-02):
#   Previously hardcoded credentials were committed to version control:
#     POSTGRES_PASSWORD=metardu_secure_2024
#     AUTH_SECRET=dev-auth-secret-32-chars-long-or-more-needed-for-nextauth
#     WORKER_SECRET=dev-worker-secret
#   These are now read from a .env file (gitignored). Copy .env.example
#   to .env and fill in strong random values before running:
#     cp .env.example .env
#     # Edit .env — generate secrets with: openssl rand -base64 32
#     docker compose up -d
#
#   IMPORTANT: If you previously deployed with the old hardcoded values,
#   you MUST rotate them:
#     1. Generate new secrets (see .env.example for commands)
#     2. Update .env on the production server
#     3. Restart all services: docker compose down && docker compose up -d
#     4. The POSTGRES_PASSWORD change requires recreating the postgres
#        volume OR running ALTER USER to change the password in-place.

services:
  metardu-postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: metardu-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-metardu}
      - POSTGRES_USER=${POSTGRES_USER:-metardu}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metardu} -d ${POSTGRES_DB:-metardu}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  metardu-worker:
    build:
      context: ./python_worker
    container_name: metardu-worker
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - WORKER_SECRET=${WORKER_SECRET:?WORKER_SECRET must be set in .env}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  metardu-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metardu-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-metardu}:${POSTGRES_PASSWORD}@metardu-postgres:5432/${POSTGRES_DB:-metardu}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET must be set in .env}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3001/ws/collaboration}
      - PYTHON_COMPUTE_URL=http://metardu-worker:8000
      - WORKER_SECRET=${WORKER_SECRET:?WORKER_SECRET must be set in .env}
      - HOSTNAME=0.0.0.0
      - DISABLE_PWA=${DISABLE_PWA:-true}
    depends_on:
      metardu-postgres:
        condition: service_healthy
      metardu-worker:
        condition: service_healthy
    restart: unless-stopped

  metardu-collaboration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metardu-collaboration
    command: node -e "require('ts-node/register'); const { getCollaborationServer } = require('./src/lib/realtime/collaborationServer'); getCollaborationServer().start(3001);"
    ports:
      - "3001:3001"
    environment:
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET must be set in .env}
      - NODE_ENV=production
    restart: unless-stopped

  # AUDIT FIX (H7, 2026-07-02): Backup sidecar runs backup.sh daily.
  # Backups are written to the `backups` volume (mount to host for
  # offsite copy). Configure via env vars:
  #   BACKUP_CRON="0 2 * * *"        (cron schedule, default daily 02:00 UTC)
  #   BACKUP_RETENTION=30            (days to keep backups)
  #   GPG_RECIPI=admin@metardu.org   (optional: encrypt backups with GPG)
  #   BACKUP_OFFSITE_DIR=/offsite    (optional: copy to secondary location)
  metardu-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: metardu-backup
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-metardu}:${POSTGRES_PASSWORD}@metardu-postgres:5432/${POSTGRES_DB:-metardu}
      - BACKUP_DIR=/backups
      - BACKUP_CRON=${BACKUP_CRON:-0 2 * * *}
      - BACKUP_RETENTION=${BACKUP_RETENTION:-30}
      - GPG_RECIPI=${GPG_RECIPI:-}
      - BACKUP_OFFSITE_DIR=${BACKUP_OFFSITE_DIR:-}
      - BACKUP_LOG_FILE=/var/log/backup.log
    volumes:
      - backups:/backups
      - ./backups:/host-backups:ro  # optional: copy to host ./backups
    depends_on:
      metardu-postgres:
        condition: service_healthy
    restart: unless-stopped

  # Public exposure: bore.pub tunnel proxies port 3000 over TCP.
  # Public URL: http://bore.pub:7788 — stable as long as this container runs.
  metardu-bore:
    image: ekzhang/bore:latest
    container_name: metardu-bore
    command:
      - "local"
      - "3000"
      - "--to"
      - "bore.pub"
      - "--port"
      - "7788"
      - "--local-host"
      - "metardu-app"
    restart: unless-stopped
    depends_on:
      metardu-app:
        condition: service_healthy

volumes:
  postgres_data:
  backups:
