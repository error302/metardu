<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>
  
  <!-- Survey triangle / compass -->
  <polygon points="256,80 380,340 132,340" stroke="#f0ede8" strokeWidth="16" fill="none"/>
  
  <!-- Inner triangle -->
  <polygon points="256,140 330,300 182,300" stroke="#f0ede8" strokeWidth="10" fill="none"/>
  
  <!-- Vertical plumb line -->
  <line x1="256" y1="80" x2="256" y2="340" stroke="#f0ede8" strokeWidth="6" strokeDasharray="20 10"/>
  
  <!-- Horizontal baseline -->
  <line x1="132" y1="340" x2="380" y2="340" stroke="#f0ede8" strokeWidth="16"/>
  
  <!-- Left leg measurement mark -->
  <line x1="132" y1="340" x2="100" y2="420" stroke="#f0ede8" strokeWidth="12" strokeLinecap="round"/>
  <line x1="100" y1="420" x2="180" y2="420" stroke="#f0ede8" strokeWidth="12" strokeLinecap="round"/>
  
  <!-- Right leg measurement mark -->
  <line x1="380" y1="340" x2="412" y2="420" stroke="#f0ede8" strokeWidth="12" strokeLinecap="round"/>
  <line x1="332" y1="420" x2="412" y2="420" stroke="#f0ede8" strokeWidth="12" strokeLinecap="round"/>
  
  <!-- Bottom baseline -->
  <line x1="100" y1="420" x2="412" y2="420" stroke="#f0ede8" strokeWidth="12" strokeLinecap="round"/>
  
  <!-- Survey point marker -->
  <circle cx="256" cy="250" r="20" fill="#f0ede8"/>
  <circle cx="256" cy="250" r="10" fill="#1a1a2e"/>
  
  <!-- Corner ticks -->
  <line x1="130" y1="338" x2="130" y2="350" stroke="#f0ede8" strokeWidth="8"/>
  <line x1="382" y1="338" x2="382" y2="350" stroke="#f0ede8" strokeWidth="8"/>
</svg>
