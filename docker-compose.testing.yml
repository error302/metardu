# =============================================================================
# METARDU Testing Environment — Docker Compose
# Mirrors Google Cloud VM production setup exactly
# Run: docker compose -f docker-compose.testing.yml up --build
# =============================================================================

services:
  # PostgreSQL with PostGIS — exact production replica
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: metardu-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: metardu_test
      POSTGRES_PASSWORD: ${DB_TEST_PASSWORD:-TestPass_2026!secure}
      POSTGRES_DB: metardu_test
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metardu_test -d metardu_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - metardu-test-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # Next.js Application — Test Instance
  metardu-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metardu-app-test
    restart: unless-stopped
    env_file:
      - .env.test
    environment:
      # Override DB to point to Docker network postgres
      DATABASE_URL: postgresql://metardu_test:${DB_TEST_PASSWORD:-TestPass_2026!secure}@postgres:5432/metardu_test
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3001
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/public/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - metardu-test-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # Automated Test Runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: metardu-test-runner
    environment:
      TEST_DATABASE_URL: postgresql://metardu_test:${DB_TEST_PASSWORD:-TestPass_2026!secure}@postgres:5432/metardu_test
      TEST_APP_URL: http://metardu-app:3000
      CI: "true"
    depends_on:
      metardu-app:
        condition: service_healthy
    volumes:
      - ./test-results:/app/test-results
    networks:
      - metardu-test-network
    command: >
      sh -c "
        echo '=== METARDU Test Runner ===' &&
        echo 'Waiting for app health check...' &&
        sleep 5 &&
        echo 'Running automated tests...' &&
        npm run test:live 2>&1 | tee /app/test-results/test-output.log &&
        echo 'Tests complete. Results in ./test-results/'
      "

volumes:
  postgres_test_data:
    driver: local

networks:
  metardu-test-network:
    driver: bridge
