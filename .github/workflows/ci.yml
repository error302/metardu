# ──────────────────────────────────────────────────────────────────────────────
# METARDU CI Pipeline
#
# Triggers on push / PR to main.
# Jobs: typecheck → lint → build → test → security audit → i18n integrity → E2E.
# Build is now gated in CI so regressions like styled-jsx in Server
# Components are caught BEFORE they reach the VM deploy.
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      # ponytail: max-warnings 0 is the target. Continue-on-error for now
      # because we have ~1300 existing 'any' warnings. Remove once resolved.
      # TODO: Remove continue-on-error after any count drops below 50
      - run: npx eslint src/ --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Block PRs that fail to build — this is the gate that catches
    # Server Component / styled-jsx / RSC violations before deploy.
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build Next.js (production)
        env:
          # Skip Sentry + GCS upload during CI build — they're not needed
          # to validate compilation and would otherwise fail without secrets.
          NEXT_PUBLIC_SENTRY_DSN: ''
          DISABLE_PWA: 'true'
        run: npx next build
      - name: Verify standalone output exists
        run: |
          test -d .next/standalone && echo "✓ standalone build OK"
          test -f .next/BUILD_ID && echo "✓ BUILD_ID present"

  i18n:
    name: i18n Integrity Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Verify all locale files parse and cover English keys
        run: node scripts/i18n-sync.mjs --check

  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx jest --silent --passWithNoTests

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        env:
          NEXT_PUBLIC_SENTRY_DSN: ''
          DISABLE_PWA: 'true'
        run: npx playwright test --reporter=list
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  mobile-build-check:
    name: Mobile Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build static export (MOBILE_BUILD=true)
        env:
          MOBILE_BUILD: 'true'
          NEXT_PUBLIC_SENTRY_DSN: ''
          DISABLE_PWA: 'true'
        run: npx next build
      - name: Verify static export exists
        run: |
          test -d out && echo "✓ static export OK"
          test -f out/index.html && echo "✓ index.html present"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - run: npm audit --audit-level=critical --production || true
