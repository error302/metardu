# ──────────────────────────────────────────────────────────────────────────────
# METARDU CI Pipeline
#
# Triggers on push / PR to main.
# Jobs: typecheck → lint → build → test → security audit → i18n integrity → E2E.
# Build is now gated in CI so regressions like styled-jsx in Server
# Components are caught BEFORE they reach the VM deploy.
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need base branch for diff-based ratchet
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      # AUDIT FIX (2026-07-05): Reworked the lint gate.
      #
      # Previous state: --max-warnings 1300 with continue-on-error: true
      # → effectively a no-op gate. New warnings were never caught.
      #
      # New behavior:
      #   1. Run eslint on CHANGED files only (vs base branch) — fast & actionable.
      #   2. Use --max-warnings 0 on changed files — no new warnings allowed.
      #   3. If no files changed, the step is skipped (exit 0).
      #   4. Whole-repo lint still runs with the 1300 baseline as a
      #      non-blocking informational check (so we can track drift).
      - name: Determine base branch
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi
      - name: Lint changed files (blocking, zero new warnings)
        run: |
          BASE="${{ steps.base.outputs.ref }}"
          echo "Base ref: $BASE"
          # Get .ts/.tsx files changed in this PR/push (including middleware.ts at root)
          CHANGED=$(git diff --name-only --diff-filter=AM "$BASE"...HEAD -- 'middleware.ts' 'src/*.ts' 'src/*.tsx' 'src/**/*.ts' 'src/**/*.tsx' | grep -vE '\.(test|spec)\.(ts|tsx)$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No TS/TSX files changed — skipping lint gate."
            exit 0
          fi
          echo "Linting changed files:"
          echo "$CHANGED"
          # shellcheck disable=SC2086
          npx eslint $CHANGED --max-warnings 0
      - name: Whole-repo lint (informational, non-blocking)
        run: npx eslint middleware.ts src/ --ext .ts,.tsx --max-warnings 1300
        continue-on-error: true

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Block PRs that fail to build — this is the gate that catches
    # Server Component / styled-jsx / RSC violations before deploy.
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build Next.js (production)
        env:
          # Skip Sentry + GCS upload during CI build — they're not needed
          # to validate compilation and would otherwise fail without secrets.
          NEXT_PUBLIC_SENTRY_DSN: ''
          DISABLE_PWA: 'true'
        run: npx next build
      - name: Verify standalone output exists
        run: |
          test -d .next/standalone && echo "✓ standalone build OK"
          test -f .next/BUILD_ID && echo "✓ BUILD_ID present"

  i18n:
    name: i18n Integrity Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Verify all locale files parse and cover English keys
        run: node scripts/i18n-sync.mjs --check

  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      # AUDIT FIX (2026-07-05): Was `npx jest --silent --passWithNoTests`
      # without `--coverage` — meaning the coverageThreshold config in
      # jest.config.js (branches:55, functions:80, lines:80, statements:80)
      # was never enforced. Tests passing ≠ code covered.
      #
      # Now: run with --coverage --coverageReporters=text-summary so the
      # thresholds gate the CI. If coverage drops below the configured
      # thresholds, this job fails.
      #
      # P2-7 (2026-07-24): Removed --passWithNoTests. METARDU has 132+ test
      # suites — if Jest finds zero tests, that's a configuration error
      # that should fail the build, not silently pass.
      - run: npx jest --silent --coverage --coverageReporters=text-summary

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        env:
          NEXT_PUBLIC_SENTRY_DSN: ''
          DISABLE_PWA: 'true'
        run: npx playwright test --reporter=list
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  mobile-build-check:
    name: Mobile Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build static export (MOBILE_BUILD=true)
        env:
          MOBILE_BUILD: 'true'
          NEXT_PUBLIC_SENTRY_DSN: ''
          DISABLE_PWA: 'true'
        run: npx next build
      - name: Verify static export exists
        run: |
          test -d out && echo "✓ static export OK"
          test -f out/index.html && echo "✓ index.html present"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      # AUDIT FIX (C10, 2026-07-02): Removed `|| true` — critical
      # vulnerabilities now block the build. Use `--omit=dev` to audit
      # only production deps (matches `--production` semantics).
      - run: npm audit --audit-level=critical --omit=dev
