name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GCP VM via Docker
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Only deploy after CI passes (typecheck + lint)
    # CI is separate workflow — this runs on push to main only

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code and rebuild Docker
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} bash -s << 'DEPLOY'
          set -eo pipefail

          APP_DIR="$HOME/metardu"
          cd "$APP_DIR"

          echo "=== [1/5] Pulling latest code ==="
          git fetch origin main
          git reset --hard origin/main

          echo "=== [2/5] Ensuring .env.local is correct for Docker ==="
          if grep -q 'host.docker.internal' .env.local 2>/dev/null; then
            echo "DATABASE_URL already set for Docker (host.docker.internal) - OK"
          else
            echo "Updating DATABASE_URL for Docker (host.docker.internal)..."
            sed -i 's|@localhost:5432|@host.docker.internal:5432|g' .env.local 2>/dev/null || true
          fi

          echo "=== [3/5] Rebuilding Docker containers (incremental) ==="
          # Use --build instead of --no-cache to leverage Docker layer cache
          # Only changed layers are rebuilt — typically just the COPY + npm run build
          docker compose up -d --build 2>&1

          # AUDIT FIX (2026-07-05): Container name was metardu_nextjs but
          # docker-compose.yml defines it as metardu-app. The old name caused
          # `docker inspect` to always return "not_found", making the health
          # loop waste 180s and then silently fall through to the curl check.
          # Also: the warning at iteration 36 was not failing the deploy.
          # Now: we exit 1 if the container is not healthy, surfacing real
          # failures (failed migrations, port conflicts, OOM, etc.) instead
          # of letting curl be the only gate.
          CONTAINER_NAME="metardu-app"

          echo "=== [4/5] Waiting for container '$CONTAINER_NAME' to be healthy ==="
          HEALTHY=false
          for i in $(seq 1 36); do
            sleep 5
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null || echo "not_found")
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy after $((i * 5)) seconds"
              HEALTHY=true
              break
            fi
            echo "  Waiting... ($((i * 5))s) status=$STATUS"
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "ERROR: Container '$CONTAINER_NAME' not healthy after 180s"
            echo "--- Last 50 log lines ---"
            docker logs --tail 50 "$CONTAINER_NAME" 2>&1 || echo "(could not fetch logs)"
            echo "--- Container state ---"
            docker ps -a --filter "name=$CONTAINER_NAME" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            exit 1
          fi

          echo "=== [5/5] Verifying deployment via HTTP ==="
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 http://localhost:3000/api/public/health || echo "000")
          echo "HTTP status: $HTTP_CODE (expecting 200 from /api/public/health)"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Deploy successful!"
          else
            echo "ERROR: Health check returned HTTP $HTTP_CODE"
            docker logs --tail 50 "$CONTAINER_NAME" 2>&1 || echo "(could not fetch logs)"
            exit 1
          fi
          DEPLOY

      - name: Verify live deployment
        if: always()
        run: |
          sleep 5
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 20 "https://${{ secrets.VM_HOST }}/" || echo "000")
          echo "Live site HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: Live site returned HTTP $HTTP_CODE"
          fi
