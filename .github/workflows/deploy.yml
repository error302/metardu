name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # Placeholder values for build-time only.
          # Runtime uses the real values from the VM's .env.local
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: build-time-placeholder-not-used-in-production
          NEXTAUTH_URL: https://34.170.248.156

      - name: Prepare deploy archive
        run: |
          tar -czf /tmp/metardu-deploy.tar.gz \
            .next/standalone/ \
            .next/static/ \
            public/ \
            ecosystem.config.cjs \
            package.json \
            scripts/

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: metardu-build
          path: /tmp/metardu-deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    environment: production

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: metardu-build
          path: /tmp/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Upload build to VM
        run: |
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            /tmp/metardu-deploy.tar.gz \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/metardu-deploy.tar.gz

      - name: Deploy on VM
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} -p 22 << 'ENDSSH'
            set -euo pipefail

            APP_DIR="/home/${{ secrets.VM_USER }}/metardu"
            PM2_APP="metardu"
            BACKUP_DIR="/home/${{ secrets.VM_USER }}/metardu-backups"

            echo "=== [1/6] Creating backup ==="
            BACKUP_TS=$(date -u +%Y%m%d_%H%M%S)
            mkdir -p "$BACKUP_DIR/$BACKUP_TS"
            [ -d "$APP_DIR/.next" ] && cp -r "$APP_DIR/.next" "$BACKUP_DIR/$BACKUP_TS/" 2>/dev/null || true
            [ -d "$APP_DIR/public" ] && cp -r "$APP_DIR/public" "$BACKUP_DIR/$BACKUP_TS/" 2>/dev/null || true
            echo "Backup: $BACKUP_TS"

            echo "=== [2/6] Cleaning old build ==="
            cd "$APP_DIR"
            rm -rf .next/standalone .next/static node_modules/.cache 2>/dev/null || true

            echo "=== [3/6] Extracting build artifacts ==="
            tar -xzf /tmp/metardu-deploy.tar.gz -C "$APP_DIR"
            rm -f /tmp/metardu-deploy.tar.gz

            echo "=== [4/6] Installing production dependencies ==="
            cd "$APP_DIR"
            npm ci --omit=dev --legacy-peer-deps 2>&1 | tail -3

            echo "=== [5/6] Restarting via PM2 ==="
            pm2 restart "$PM2_APP" --update-env 2>&1 || pm2 start ecosystem.config.cjs
            pm2 save

            echo "=== [6/6] Health check ==="
            sleep 8
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 http://localhost:3000/ || echo "000")
            echo "HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Deploy successful"
              cd "$BACKUP_DIR" && ls -1dt */ 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
            else
              echo "Health check failed (HTTP $HTTP_CODE) — rolling back"
              rm -rf "$APP_DIR/.next"
              cp -r "$BACKUP_DIR/$BACKUP_TS/.next" "$APP_DIR/.next" 2>/dev/null || true
              pm2 restart "$PM2_APP" --update-env
              sleep 5
              echo "Rollback complete"
              exit 1
            fi
          ENDSSH

      - name: Verify live deployment
        if: always()
        run: |
          sleep 5
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 20 "https://${{ secrets.VM_HOST }}/" || echo "000")
          echo "Live site HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: Live site returned HTTP $HTTP_CODE"
          fi
