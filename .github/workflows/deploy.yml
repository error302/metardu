name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: build-time-placeholder-not-used-in-production
          NEXTAUTH_URL: https://34.170.248.156

      - name: Prepare deploy archive
        run: |
          tar -czf /tmp/metardu-deploy.tar.gz \
            .next/standalone/ \
            .next/static/ \
            .next/BUILD_ID \
            public/ \
            ecosystem.config.cjs \
            package.json \
            scripts/
          echo "Archive size: $(du -h /tmp/metardu-deploy.tar.gz | cut -f1)"

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: metardu-build
          path: /tmp/metardu-deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    environment: production

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: metardu-build
          path: /tmp/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Upload build and deploy script to VM
        run: |
          # Upload the build archive
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            /tmp/metardu-deploy.tar.gz \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/metardu-deploy.tar.gz

          # Create deploy script locally then upload it
          cat > /tmp/deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -eo pipefail

          APP_DIR="/home/mohameddosho20/metardu"
          PM2_APP="metardu"
          BACKUP_DIR="/home/mohameddosho20/metardu-backups"

          echo "=== [0/6] VM State ==="
          echo "User: $(whoami)"
          echo "Node: $(node -v 2>/dev/null || echo 'not found')"
          echo "PM2: $(pm2 -v 2>/dev/null || echo 'not found')"
          echo ""
          echo "=== App dir ==="
          ls "$APP_DIR/.next/BUILD_ID" 2>/dev/null && echo "Old BUILD_ID: $(cat $APP_DIR/.next/BUILD_ID)" || echo "No .next/BUILD_ID"
          ls /tmp/metardu-deploy.tar.gz 2>/dev/null && echo "Archive: present ($(du -h /tmp/metardu-deploy.tar.gz | cut -f1))" || echo "Archive: MISSING"
          echo ""
          echo "=== Port 3000 ==="
          ss -tlnp 2>/dev/null | grep 3000 || echo "Nothing on port 3000"
          echo ""
          echo "=== PM2 processes ==="
          pm2 list 2>/dev/null || echo "PM2 not running"

          echo "=== [1/6] Creating backup ==="
          BACKUP_TS=$(date -u +%Y%m%d_%H%M%S)
          mkdir -p "$BACKUP_DIR/$BACKUP_TS"
          [ -d "$APP_DIR/.next" ] && cp -r "$APP_DIR/.next" "$BACKUP_DIR/$BACKUP_TS/" 2>/dev/null || true
          echo "Backup: $BACKUP_TS"

          echo "=== [2/6] Stopping PM2 process ==="
          cd "$APP_DIR" 2>/dev/null || mkdir -p "$APP_DIR" && cd "$APP_DIR"
          pm2 stop "$PM2_APP" 2>/dev/null || true
          sleep 3
          fuser -k 3000/tcp 2>/dev/null || true
          sleep 1

          echo "=== [3/6] Replacing build artifacts ==="
          rm -rf "$APP_DIR/.next" "$APP_DIR/public" 2>/dev/null || true
          tar -xzf /tmp/metardu-deploy.tar.gz -C "$APP_DIR"
          rm -f /tmp/metardu-deploy.tar.gz
          echo "New BUILD_ID: $(cat $APP_DIR/.next/BUILD_ID 2>/dev/null || echo 'N/A')"
          ls "$APP_DIR/.next/standalone/server.js" 2>/dev/null && echo "Standalone: OK" || echo "Standalone: MISSING"

          echo "=== [4/6] Starting PM2 process ==="
          cd "$APP_DIR"
          pm2 delete "$PM2_APP" 2>/dev/null || true
          pm2 start ecosystem.config.cjs
          pm2 save

          echo "PM2 after start:"
          pm2 list

          echo "=== [5/6] Health check ==="
          sleep 10
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 http://localhost:3000/ || echo "000")
          echo "HTTP status: $HTTP_CODE"

          echo "=== [6/6] Cleanup ==="
          if [ "$HTTP_CODE" = "200" ]; then
              echo "Deploy successful"
              cd "$BACKUP_DIR" && ls -1dt */ 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
          else
              echo "Health check failed (HTTP $HTTP_CODE) — rolling back"
              pm2 stop "$PM2_APP" 2>/dev/null || true
              rm -rf "$APP_DIR/.next"
              cp -r "$BACKUP_DIR/$BACKUP_TS/.next" "$APP_DIR/.next" 2>/dev/null || true
              pm2 start ecosystem.config.cjs
              pm2 save
              sleep 5
              echo "Rollback complete"
              exit 1
          fi
          SCRIPT

          chmod +x /tmp/deploy.sh
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            /tmp/deploy.sh \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/deploy.sh

      - name: Execute deploy on VM
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "bash /tmp/deploy.sh"

      - name: Verify live deployment
        if: always()
        run: |
          sleep 5
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 20 "https://${{ secrets.VM_HOST }}/" || echo "000")
          echo "Live site HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: Live site returned HTTP $HTTP_CODE"
          fi
