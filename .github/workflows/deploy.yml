name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: build-time-placeholder-not-used-in-production
          NEXTAUTH_URL: https://34.170.248.156

      - name: Record build ID
        run: |
          echo "Build ID: $(cat .next/BUILD_ID)"
          echo "BUILD_ID=$(cat .next/BUILD_ID)" >> $GITHUB_ENV

      - name: Prepare deploy archive
        run: |
          tar -czf /tmp/metardu-deploy.tar.gz \
            .next/standalone/ \
            .next/static/ \
            .next/BUILD_ID \
            public/ \
            ecosystem.config.cjs \
            package.json \
            scripts/
          echo "Archive size: $(du -h /tmp/metardu-deploy.tar.gz | cut -f1)"

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: metardu-build
          path: /tmp/metardu-deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    environment: production

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: metardu-build
          path: /tmp/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Upload build to VM
        run: |
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            /tmp/metardu-deploy.tar.gz \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/metardu-deploy.tar.gz

      - name: Diagnose VM state
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} -p 22 << 'ENDSSH'
            echo "=== VM State Diagnosis ==="
            echo "User: $(whoami)"
            echo "Home: $HOME"
            echo "CWD: $(pwd)"
            echo ""
            echo "=== App directory ==="
            ls -la /home/mohameddosho20/metardu/ 2>/dev/null || echo "NOT FOUND"
            echo ""
            echo "=== .next directory ==="
            ls -la /home/mohameddosho20/metardu/.next/ 2>/dev/null || echo "NOT FOUND"
            echo ""
            echo "=== Current BUILD_ID ==="
            cat /home/mohameddosho20/metardu/.next/BUILD_ID 2>/dev/null || echo "NOT FOUND"
            echo ""
            echo "=== Uploaded archive ==="
            ls -la /tmp/metardu-deploy.tar.gz 2>/dev/null || echo "NOT FOUND"
            echo ""
            echo "=== PM2 status ==="
            pm2 list 2>/dev/null || echo "PM2 not found"
            echo ""
            echo "=== What's on port 3000 ==="
            ss -tlnp | grep 3000 || echo "Nothing on port 3000"
            echo ""
            echo "=== Disk space ==="
            df -h /home/mohameddosho20/ 2>/dev/null
          ENDSSH

      - name: Deploy on VM
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} -p 22 << 'ENDSSH'
            set -eo pipefail

            APP_DIR="/home/mohameddosho20/metardu"
            PM2_APP="metardu"
            BACKUP_DIR="/home/mohameddosho20/metardu-backups"

            echo "=== [1/5] Creating backup ==="
            BACKUP_TS=$(date -u +%Y%m%d_%H%M%S)
            mkdir -p "$BACKUP_DIR/$BACKUP_TS"
            [ -d "$APP_DIR/.next" ] && cp -r "$APP_DIR/.next" "$BACKUP_DIR/$BACKUP_TS/" 2>/dev/null || true
            echo "Backup: $BACKUP_TS"

            echo "=== [2/5] Stopping PM2 process ==="
            cd "$APP_DIR"
            pm2 stop "$PM2_APP" 2>/dev/null || true
            sleep 3

            # Force-kill anything still on port 3000
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 1

            echo "=== [3/5] Replacing build artifacts ==="
            cd "$APP_DIR"
            rm -rf .next public 2>/dev/null || true
            tar -xzf /tmp/metardu-deploy.tar.gz -C "$APP_DIR"
            rm -f /tmp/metardu-deploy.tar.gz

            echo "New BUILD_ID: $(cat .next/BUILD_ID 2>/dev/null || echo 'N/A')"
            echo "Standalone server: $(ls -la .next/standalone/server.js 2>/dev/null || echo 'N/A')"

            echo "=== [4/5] Starting PM2 process ==="
            cd "$APP_DIR"
            pm2 delete "$PM2_APP" 2>/dev/null || true
            pm2 start ecosystem.config.cjs
            pm2 save

            echo "PM2 status after start:"
            pm2 list

            echo "=== [5/5] Health check ==="
            sleep 10
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 http://localhost:3000/ || echo "000")
            echo "HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Deploy successful"
              cd "$BACKUP_DIR" && ls -1dt */ 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
            else
              echo "Health check failed (HTTP $HTTP_CODE) — rolling back"
              pm2 stop "$PM2_APP" 2>/dev/null || true
              rm -rf "$APP_DIR/.next"
              cp -r "$BACKUP_DIR/$BACKUP_TS/.next" "$APP_DIR/.next" 2>/dev/null || true
              pm2 start ecosystem.config.cjs
              pm2 save
              sleep 5
              echo "Rollback complete"
              exit 1
            fi
          ENDSSH

      - name: Verify live deployment
        if: always()
        run: |
          sleep 5
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 20 "https://${{ secrets.VM_HOST }}/" || echo "000")
          echo "Live site HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: Live site returned HTTP $HTTP_CODE"
          fi
